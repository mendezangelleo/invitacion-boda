<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Confirmar asistencia — Anyela & Angel</title>
  <meta name="theme-color" content="#527e69">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    /* ===== PALETA UNIFICADA ===== */
    :root{
      --color-fondo:#FAF1E4;
      --color-primario:#527e69;
      --color-secundario:#A9C4A4;
      --color-texto:#344C3D;
      --color-texto-claro:#FAF1E4;
      --border:rgba(82,126,105,.2);
      --shadow:0 10px 30px rgba(0,0,0,.15);
      --shadow-soft:0 12px 24px rgba(82,126,105,.20);
      --glass:rgba(255,255,255,.9);

      --danger:#c0392b;
      --danger-soft:rgba(192,57,43,.16);
      --success:#2e7d32;
      --success-soft:rgba(46,125,50,.14);
    }

    *{ box-sizing:border-box }
    html,body{ height:100% }

    body{
      margin:0;
      color:var(--color-texto);
      font-family:'Roboto', system-ui, sans-serif;
      line-height:1.6;
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:24px;
      background-image:url('img/vecteezy_ai-generated-eucalyptus-leaves-background-on-white-marble_35463410.jpg');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      overflow-x:hidden;
    }

    .card{
      width:min(550px, 100%);
      background:var(--glass);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid var(--border);
      border-radius:18px;
      padding:32px 36px;
      box-shadow:var(--shadow);
      position:relative;
      z-index:2;
      max-height:95vh;
      overflow:auto;
      animation:fadeIn .5s ease;
    }

    /* Scrollbar sutil */
    .card::-webkit-scrollbar{ width:10px }
    .card::-webkit-scrollbar-thumb{
      background:rgba(82,126,105,.25);
      border-radius:999px;
      border:3px solid rgba(255,255,255,.7);
    }

    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(10px) }
      to{ opacity:1; transform:translateY(0) }
    }

    /* ===== CIERRE (X) MEJORADA ===== */
    .modal-close{
      position:absolute;
      top:calc(14px + env(safe-area-inset-top, 0px));
      right:calc(14px + env(safe-area-inset-right, 0px));
      width:42px;
      height:42px;
      border-radius:999px;
      display:grid;
      place-items:center;
      text-decoration:none;
      color:var(--color-texto);
      background:rgba(255,255,255,.65);
      border:1px solid var(--border);
      box-shadow:0 6px 16px rgba(0,0,0,.08);
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
      opacity:.85;
      cursor:pointer;
      user-select:none;
    }
    .modal-close span{
      font-size:1.55rem;
      line-height:1;
      font-weight:300;
      transform:translateY(-1px);
      display:block;
    }
    .modal-close:hover{
      opacity:1;
      transform:rotate(6deg) scale(1.06);
      background:rgba(255,255,255,.9);
      box-shadow:0 10px 22px rgba(0,0,0,.12);
    }
    .modal-close:active{ transform:rotate(0deg) scale(.98) }

    h1{
      margin:0 0 10px;
      font-size:2.8rem;
      font-family:'Dancing Script', cursive;
      font-weight:700;
      color:var(--color-primario);
      text-align:center;
      letter-spacing:.2px;
    }

    .muted{
      color:var(--color-texto);
      opacity:.8;
      text-align:center;
      margin-bottom:24px;
      font-size:1.1rem;
    }

    .form-fields{ display:grid; gap:20px }
    .form-group{ width:100% }

    label[for], .label-group{
      display:block;
      margin-bottom:8px;
      font-weight:700;
      font-size:.8rem;
      text-transform:uppercase;
      color:var(--color-primario);
      letter-spacing:.6px;
    }

    /* ===== BADGE PASAJEROS ===== */
    .count-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      font-size:.82rem;
      font-weight:800;
      background:rgba(82,126,105,.12);
      color:var(--color-primario);
      border:1px solid rgba(82,126,105,.25);
    }

    /* ===== VALIDACIÓN VISUAL (ROJO/VERDE) ===== */
    .is-invalid{
      border-color:var(--danger) !important;
      box-shadow:0 0 0 3px var(--danger-soft) !important;
    }
    .is-valid{
      border-color:var(--success) !important;
      box-shadow:0 0 0 3px var(--success-soft) !important;
    }
    .error-block{
      border:1px solid rgba(192,57,43,.35) !important;
      box-shadow:0 0 0 3px rgba(192,57,43,.10) !important;
      background:rgba(192,57,43,.03) !important;
    }
    .hint-error{
      color:var(--danger);
      font-weight:600;
    }

    /* ===== EMAILS DINÁMICOS (mejor layout + X separada) ===== */
    #email-container{
      display:grid;
      gap:10px;
      margin-bottom:10px;
    }

    .email-row{
      position:relative;
      display:flex;
      align-items:center;
      animation:slideIn .25s ease;
    }

    /* dejamos espacio para el botón de remover */
    .email-row.has-remove .email-input{
      padding-right:56px; /* espacio para la X */
    }

    @keyframes slideIn{
      from{ opacity:0; transform:translateX(-10px) }
      to{ opacity:1; transform:translateX(0) }
    }

    .btn-remove-email{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      background:#f8d7da;
      color:#c0392b;
      border:none;
      width:34px;
      height:34px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s;
      font-size:.9rem;
      box-shadow:0 6px 16px rgba(192,57,43,.12);
    }
    .btn-remove-email:hover{ background:#f1b0b7 }

    .btn-add-email{
      background:transparent;
      border:1px dashed var(--color-primario);
      color:var(--color-primario);
      padding:10px;
      border-radius:10px;
      font-size:.75rem;
      font-weight:800;
      cursor:pointer;
      width:100%;
      transition:all .2s ease;
      letter-spacing:.6px;
      text-transform:uppercase;
    }
    .btn-add-email:hover{
      background:rgba(82,126,105,.06);
      border-style:solid;
      transform:translateY(-1px);
    }

    input[type="text"], input[type="email"]{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--color-texto);
      font-size:1rem;
    }

    input:focus{
      border-color:var(--color-primario);
      box-shadow:0 0 0 3px rgba(82,126,105,.12);
      outline:none;
    }

    /* Autofill (Chrome/WebKit) - mantenemos look limpio */
    input:-webkit-autofill{
      -webkit-text-fill-color:var(--color-texto) !important;
      transition:background-color 9999s ease-in-out 0s;
      caret-color:var(--color-texto);
    }

    /* ===== Autofill watcher (Chrome) ===== */
    @keyframes onAutoFillStart { from {} to {} }
    input:-webkit-autofill{
      animation-name:onAutoFillStart;
      animation-duration:0.01s;
    }

    .names{ display:grid; grid-template-columns:1fr; gap:.6rem }
    .names label{
      display:flex;
      gap:.8rem;
      align-items:center;
      background:rgba(82,126,105,.04);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      cursor:pointer;
      transition:transform .15s ease, background .15s ease;
    }
    .names label:hover{
      background:rgba(82,126,105,.07);
      transform:translateY(-1px);
    }

    .btns{
      display:flex;
      gap:12px;
      margin-top:24px;
      flex-direction:column;
    }

    button, .btn{
      padding:14px 20px;
      border-radius:12px;
      border:2px solid var(--color-primario);
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:.9rem;
      text-transform:uppercase;
      transition:transform .18s ease, opacity .18s ease, box-shadow .18s ease, background .18s ease;
      width:100%;
      letter-spacing:.5px;
    }

    .primary{
      background:var(--color-primario);
      color:white;
      box-shadow:var(--shadow-soft);
    }
    .secondary{
      background:transparent;
      color:var(--color-primario);
    }

    .primary:hover, .secondary:hover{
      transform:translateY(-2px);
      opacity:.95;
    }
    .primary:active, .secondary:active{ transform:translateY(0px) scale(.99) }

    button:disabled{
      opacity:.7;
      cursor:not-allowed;
      transform:none !important;
    }

    /* ===== LOGO PANTALLAS FINALES ===== */
    .final-screen-logo{
      display:block;
      margin:0 auto 18px;
      width:150px;
      height:150px;
      object-fit:cover;
      border-radius:50%;
      background-color:#fff;
      border:4px solid var(--color-secundario);
      box-shadow:0 12px 24px rgba(82,126,105,.25), 0 4px 8px rgba(0,0,0,.08) inset;
      animation:popLogo .6s cubic-bezier(.34,1.56,.64,1) backwards;
    }

    @keyframes popLogo{
      0%{ opacity:0; transform:scale(.5) translateY(20px) }
      100%{ opacity:1; transform:scale(1) translateY(0) }
    }

    /* ===== ICONO OK/NO (círculo fijo) ===== */
    .success-icon-new{
      width:68px;
      height:68px;
      border-radius:999px;
      display:grid;
      place-items:center;
      margin:0 auto 14px;
      color:#fff;
      box-shadow:0 14px 28px rgba(0,0,0,.16);
      border:1px solid rgba(255,255,255,.35);
    }
    .success-icon-new i{ font-size:1.55rem }

    #success-wrapper{ text-align:center }
    #success-wrapper h3{
      margin:10px 0 6px;
      font-family:'Playfair Display', serif;
      color:var(--color-primario);
      font-size:1.55rem;
    }
    #success-wrapper p{
      margin:0 auto 6px;
      max-width:38ch;
      opacity:.9;
    }

    /* ===== VOLVER (más bonito + flecha) ===== */
    .text-link-elegant{
      background:transparent;
      border:none;
      color:var(--color-primario);
      text-transform:none;
      font-weight:600;
      font-family:'Playfair Display', serif;
      font-size:1.1rem;
      padding:10px 8px;
      width:auto;
      margin:6px auto 0;
      letter-spacing:0;
      gap:10px;
      position:relative;
    }
    .text-link-elegant::after{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:2px;
      width:0%;
      height:2px;
      background:rgba(82,126,105,.55);
      border-radius:999px;
      transition:width .2s ease;
    }
    .text-link-elegant:hover{ transform:none; opacity:1 }
    .text-link-elegant:hover::after{ width:70% }

    @media (max-width:420px){
      .card{ padding:26px 20px; border-radius:18px }
      h1{ font-size:2.5rem }
      .modal-close{ width:40px; height:40px; top:12px; right:12px }
    }
  </style>
</head>

<body>
  <main class="card">
    <a href="javascript:void(0)" onclick="regresarAlIndex()" class="modal-close" id="modal-close-btn" aria-label="Cerrar">
      <span>×</span>
    </a>

    <div id="decision-wrapper">
      <h1>Anyela & Angel</h1>
      <p class="muted">El vuelo más importante de nuestras vidas está por despegar.</p>

      <h2 style="text-align:center; font-family:'Playfair Display', serif; color:var(--color-primario); margin-bottom:20px;">
        ¿Podrás acompañarnos?
      </h2>

      <div class="btns">
        <button class="primary" onclick="handleDecision('YES')">
          <i class="fa-solid fa-heart"></i> ¡SÍ, AHÍ ESTARÉ!
        </button>

        <button class="secondary" onclick="handleDecision('NO')">
          <i class="fa-solid fa-xmark"></i> NO PODRÉ ASISTIR
        </button>
      </div>
    </div>

    <div id="form-wrapper" style="display:none;">
      <h1>Confirmación</h1>
      <p class="muted">Registra a los pasajeros de tu grupo</p>

      <form id="form" novalidate>
        <div class="form-fields">
          <div class="form-group" id="passengers-block">
            <p id="who" class="label-group"></p>
            <div id="names" class="names"></div>
          </div>

          <div class="form-group">
            <label>TU EMAIL (REQUERIDO)</label>
            <div id="email-container">
              <div class="email-row">
                <input type="email" class="email-input" placeholder="tu@correo.com" required autocomplete="email">
              </div>
            </div>

            <button type="button" id="add-email-btn" class="btn-add-email" onclick="addEmailField()">
              <i class="fa-solid fa-plus"></i> AGREGAR OTRO EMAIL
            </button>
          </div>

          <div class="form-group">
            <label for="diet">¿RESTRICCIONES ALIMENTARIAS? (OPCIONAL)</label>
            <input id="diet" type="text" placeholder="Ej: Celíaco, Vegano, Alergias..." maxlength="150">
          </div>

          <div class="form-group">
            <label for="song">¿QUÉ CANCIÓN NO PUEDE FALTAR? (OPCIONAL)</label>
            <input id="song" type="text" placeholder="Artista – Título" maxlength="100">
          </div>
        </div>

        <div class="btns">
          <button class="primary" type="submit"><i class="fa-solid fa-check-circle"></i> Enviar confirmación</button>
          <button type="button" class="secondary" onclick="goBackToDecision()">Atrás</button>
        </div>
      </form>

      <p id="msg" style="margin-top:16px; text-align:center;"></p>
    </div>

    <div id="success-wrapper" style="display:none;"></div>
  </main>

<script>
    // 1. CONFIGURACIÓN Y REFERENCIAS
    const FORM_ID = '1FAIpQLScI55PoKtGyNL_bLnmXxTqm7qqP4FgaB-szjos8HyGCq6csSA';
    const ENTRY = {
        token: 'entry.1066647005',
        email: 'entry.1720049127',
        asistentes: 'entry.43373152',
        diet: 'entry.721847906',
        cancion: 'entry.1414011419',
    };
    const FORM_ACTION = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;
    const GUESTS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxwXGm1twFAyPz8C_FM3BH2sN40t85Ib7SnczDOo4hd3fTJveiifHOMrCmJPHXtFhh_Ng/exec';

    const decisionDiv = document.getElementById('decision-wrapper');
    const formDiv = document.getElementById('form-wrapper');
    const successDiv = document.getElementById('success-wrapper');
    const listEl = document.getElementById('names');
    const msgEl = document.getElementById('msg');
    const formEl = document.getElementById('form');
    const passengersBlock = document.getElementById('passengers-block');

    const qp = new URLSearchParams(location.search);
    const token = (qp.get('t') || sessionStorage.getItem('invite_t') || '').trim();
    const sig = (qp.get('sig') || sessionStorage.getItem('invite_sig') || '').trim();

    let totalInGroup = 0;

    if (token) sessionStorage.setItem('invite_t', token);
    if (sig) sessionStorage.setItem('invite_sig', sig);

    // 2. NAVEGACIÓN Y LIMPIEZA
    function regresarAlIndex() {
        const t = sessionStorage.getItem('invite_t') || '';
        const s = sessionStorage.getItem('invite_sig') || '';
        window.location.href = `index.html?t=${encodeURIComponent(t)}&sig=${encodeURIComponent(s)}`;
    }

    // ESTA FUNCIÓN AHORA LIMPIA TODO (Solución al problema de los campos)
    function goBackToDecision() {
        clearMsg();
        
        // Reiniciar el formulario (limpia inputs de texto y checkboxes)
        formEl.reset();
        
        // Quitar campos de email extra si existen
        const emailContainer = document.getElementById('email-container');
        while (emailContainer.children.length > 1) {
            emailContainer.lastElementChild.remove();
        }
        document.getElementById('add-email-btn').style.display = 'block';

        // Quitar clases de validación (rojo/verde)
        document.querySelectorAll('.is-valid, .is-invalid').forEach(el => {
            el.classList.remove('is-valid', 'is-invalid');
        });

        // Volver visualmente a la primera pantalla
        formDiv.style.display = 'none';
        successDiv.style.display = 'none';
        decisionDiv.style.display = 'block';
    }

    // 3. CARGA DE DATOS
    (function preLoadData() {
        const cached = sessionStorage.getItem('guestData');
        if (cached) {
            try {
                const gd = JSON.parse(cached);
                if (gd.token === token) {
                    renderGuestList(gd.names);
                    return;
                }
            } catch(e){}
        }
        if (token && sig) {
            fetch(`${GUESTS_ENDPOINT}?t=${encodeURIComponent(token)}&sig=${encodeURIComponent(sig)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        sessionStorage.setItem('guestData', JSON.stringify({token, names: data.names}));
                        renderGuestList(data.names);
                    }
                });
        }
    })();

    function renderGuestList(names) {
        if (!listEl) return;
        totalInGroup = names.length;
        listEl.innerHTML = names.map(n => `
            <label>
                <input type="checkbox" name="asist" value="${String(n).replace(/"/g,'&quot;')}" checked />
                <span>${n}</span>
            </label>
        `).join('');
        updateCountBadge();
    }

    // 4. MANEJO DE BOTONES (SI / NO)
    async function handleDecision(choice) {
        if (!token) return alert("Falta el código de invitado.");

        if (choice === 'YES') {
            decisionDiv.style.display = 'none';
            formDiv.style.display = 'block';
            // Los nombres ya fueron cargados por preLoadData
        } else {
            // Acción para el NO
            showFinalScreen('NO');
            const body = new URLSearchParams();
            body.set(ENTRY.token, token);
            body.set(ENTRY.asistentes, 'DECLINÓ INVITACIÓN');
            body.set(ENTRY.email, 'no-asiste@boda.com');
            fetch(FORM_ACTION, { method: 'POST', mode: 'no-cors', body });
        }
    }

    // 5. VALIDACIONES Y ENVÍO
    function updateCountBadge() {
        const selected = document.querySelectorAll('input[name="asist"]:checked').length;
        const badgeEl = document.getElementById('who');
        if (badgeEl) badgeEl.innerHTML = `PASAJEROS: <span class="count-badge">${selected} / ${totalInGroup}</span>`;
    }

    function isEmailValid(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/i.test(v); }

    formEl.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearMsg();

        const emailInputs = document.querySelectorAll('.email-input');
        const selectedNames = [...document.querySelectorAll('input[name="asist"]:checked')].map(i => i.value);

        let emailsOk = true;
        emailInputs.forEach(i => {
            const val = i.value.trim();
            if (!isEmailValid(val)) {
                i.classList.add('is-invalid');
                emailsOk = false;
            } else {
                i.classList.remove('is-invalid');
                i.classList.add('is-valid');
            }
        });

        if (!emailsOk) { msgEl.textContent = 'Ingresa un email válido.'; return; }
        if (selectedNames.length === 0) {
            msgEl.textContent = 'Selecciona al menos un pasajero.';
            passengersBlock.classList.add('error-block');
            return;
        }

        const submitBtn = formEl.querySelector('button.primary');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-plane fa-spin"></i> ENVIANDO...';

        const body = new URLSearchParams();
        body.set(ENTRY.token, token);
        body.set(ENTRY.email, [...emailInputs].map(i => i.value).join(', '));
        body.set(ENTRY.asistentes, selectedNames.join(', '));
        body.set(ENTRY.diet, document.getElementById('diet').value.trim());
        body.set(ENTRY.cancion, document.getElementById('song').value.trim());

        try {
            await fetch(FORM_ACTION, { method: 'POST', mode: 'no-cors', body });
            showFinalScreen('YES');
        } catch (err) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Enviar confirmación';
            msgEl.textContent = 'Error al enviar. Reintenta.';
        }
    });

    // 6. PANTALLAS FINALES
    function showFinalScreen(type) {
        decisionDiv.style.display = 'none';
        formDiv.style.display = 'none';
        successDiv.style.display = 'block';

        const isYes = (type === 'YES');
        const logoPath = 'img/Logo definitivo.png';

        successDiv.innerHTML = `
            <img src="${logoPath}" alt="Logo A&A" class="final-screen-logo">
            <div class="success-icon-new" style="background-color: ${isYes ? 'var(--color-primario)' : '#c0392b'};">
                <i class="fa-solid ${isYes ? 'fa-check' : 'fa-plane-slash'}"></i>
            </div>
            <h3>${isYes ? '¡Vuelo Confirmado!' : 'Te extrañaremos'}</h3>
            <p>${isYes ? 'Tu confirmación ha sido registrada. Te enviamos los detalles y el pase de abordar a tu email.' : 'Qué pena que no puedas acompañarnos en este viaje, pero agradecemos mucho que nos hayas avisado.'}</p>
            <div class="btns">
                <button class="btn secondary text-link-elegant" onclick="regresarAlIndex()">
                    <i class="fa-solid fa-arrow-left"></i> Volver a la invitación
                </button>
            </div>
        `;
    }

    function addEmailField() {
        const container = document.getElementById('email-container');
        if (container.querySelectorAll('.email-row').length >= 3) return;
        const div = document.createElement('div');
        div.className = 'email-row has-remove';
        div.innerHTML = `<input type="email" class="email-input" placeholder="otro@correo.com" required>
                         <button type="button" class="btn-remove-email" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(div);
    }

    function clearMsg() { 
        msgEl.textContent = ''; 
        if(passengersBlock) passengersBlock.classList.remove('error-block');
    }
</script>
</body>
</html>
