<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Fotos — Anyela & Ángel</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --olive: #527e69;
      --text:  #344C3D;
      --cream: #FAF1E4;
      --beige: #A9C4A4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 16px;
      gap: 28px;
    }

    /* ── Tarjeta QR ── */
    .qr-card {
      background: white;
      border: 1.5px solid rgba(82,126,105,.2);
      border-radius: 20px;
      padding: 32px 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .qr-card img.logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--beige);
      margin-bottom: 14px;
    }

    .qr-card h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 1.9rem;
      color: var(--olive);
      line-height: 1.15;
      margin-bottom: 4px;
    }

    .qr-card .subtitle {
      font-size: .78rem;
      color: var(--text);
      opacity: .65;
      margin-bottom: 20px;
      letter-spacing: .03em;
    }

    #qrcode {
      display: inline-block;
      padding: 10px;
      background: white;
      border: 1px solid rgba(82,126,105,.15);
      border-radius: 10px;
      margin-bottom: 18px;
    }
    #qrcode img, #qrcode canvas { display: block; }

    .qr-card .cta {
      font-size: .82rem;
      font-weight: 600;
      color: var(--olive);
      margin-bottom: 6px;
    }

    .qr-card .url {
      font-size: .72rem;
      color: var(--text);
      opacity: .5;
      word-break: break-all;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--beige), transparent);
      margin: 0 auto 16px;
    }

    /* ── Botones de acción (ocultos al imprimir) ── */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: .88rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: filter .2s, transform .15s;
    }
    .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn.primary   { background: var(--olive); color: white; }
    .btn.secondary { background: white; color: var(--olive); border: 1.5px solid var(--beige); }
    .btn.whatsapp  { background: #25D366; color: white; }

    /* ── PRINT ── */
    @media print {
      body { background: white; padding: 0; justify-content: flex-start; }
      .actions { display: none; }
      .qr-card {
        box-shadow: none;
        border: 1px solid #ddd;
        border-radius: 12px;
        margin: 0 auto;
        page-break-inside: avoid;
      }
    }

    /* ── Grilla para imprimir múltiples tarjetas ── */
    @media print {
      .print-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="qr-card" id="mainCard">
    <img src="img/Logo definitivo.png" alt="A&A" class="logo">
    <h1>Compartí tus fotos</h1>
    <p class="subtitle">Boda de Anyela &amp; Ángel · 24.07.2026</p>
    <div class="divider"></div>
    <div id="qrcode"></div>
    <p class="cta">Escaneá y subí tus fotos</p>
    <p class="url" id="qrUrl"></p>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="window.print()">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M2.5 8a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z"/>
        <path d="M5 1a2 2 0 0 0-2 2v2H2a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h1v1a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1h1a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-1V3a2 2 0 0 0-2-2H5zM4 3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2H4V3zm1 5a2 2 0 0 0-2 2v1H2a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v-1a2 2 0 0 0-2-2H5zm7 2v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1z"/>
      </svg>
      Imprimir
    </button>
    <a id="btnWa" class="btn whatsapp" target="_blank" rel="noopener">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
      </svg>
      Compartir
    </a>
    <a href="fotos.html" class="btn secondary">← Volver a subir fotos</a>
  </div>

  <script>
    const FOTOS_URL = 'https://www.nuestraboda-anyela-angel.com/fotos.html';

    document.getElementById('qrUrl').textContent = FOTOS_URL;

    new QRCode(document.getElementById('qrcode'), {
      text: FOTOS_URL,
      width: 200,
      height: 200,
      colorDark: '#344C3D',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H,  // máxima corrección para impresión
    });

    document.getElementById('btnWa').href =
      'https://wa.me/?text=' + encodeURIComponent(
        '¡Subí tus fotos y videos de la boda de Anyela & Angel aca!\n' + FOTOS_URL
      );
  </script>

</body>
</html>
