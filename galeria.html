<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light">
  <title>Galería — Anyela & Ángel</title>
  <meta name="theme-color" content="#527e69">
  <meta name="robots" content="noindex">

  <link rel="icon" href="img/Logo_definitivo_redondo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    :root {
      --olive:   #527e69;
      --beige:   #A9C4A4;
      --cream:   #FAF1E4;
      --text:    #344C3D;
      --border:  rgba(82,126,105,.18);
      --glass:   rgba(255,255,255,.88);
      --shadow:  0 8px 28px rgba(0,0,0,.1);
      --font-t:  'Dancing Script', cursive;
      --font-b:  'Montserrat', sans-serif;
      color-scheme: light;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-b);
      color: var(--text);
      background: transparent;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url('img/vecteezy_ai-generated-eucalyptus-leaves-background-on-white-marble_35463410.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
    }

    /* ── HEADER ── */
    .hdr {
      position: fixed; inset: 0 0 auto; height: 64px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(250,241,228,.6);
      backdrop-filter: blur(14px) saturate(140%); -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid rgba(82,126,105,.15);
      box-shadow: 0 4px 16px rgba(0,0,0,.05); z-index: 200;
    }
    .hdr img { height: 44px; width: 44px; border-radius: 50%; object-fit: cover; }
    .hdr .hdr-title { font-family: var(--font-t); font-size: 1.35rem; color: var(--olive); }

    /* ── MAIN ── */
    .main { padding: 80px 12px 32px; max-width: 1200px; margin: 0 auto; }

    /* ── HERO ── */
    .hero { text-align: center; padding: 20px 0 14px; }
    .hero h1 { font-family: var(--font-t); font-size: clamp(2.4rem,6vw,3.2rem); color: var(--olive); margin-bottom: 6px; }
    .hero p  { font-size: .88rem; opacity: .7; }

    /* ── STATS ── */
    .stats {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      margin: 14px 0;
    }
    .stat-chip {
      background: var(--glass); border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 14px; font-size: .8rem; font-weight: 600; color: var(--olive);
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin: 10px 0 16px;
    }
    .upload-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; background: var(--olive); color: white;
      font-family: var(--font-b); font-weight: 700; font-size: .85rem;
      text-decoration: none; transition: filter .2s, transform .15s;
    }
    .upload-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

    .top-actions { display: flex; gap: 8px; }
    .action-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: 10px;
      font-family: var(--font-b); font-weight: 700; font-size: .82rem;
      border: 1.5px solid var(--border); background: var(--glass); color: var(--text);
      cursor: pointer; transition: all .2s;
    }
    .action-btn:hover { background: var(--olive); color: white; border-color: var(--olive); }
    .action-btn.active { background: var(--olive); color: white; border-color: var(--olive); }
    .action-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── CATEGORY TABS ── */
    .cat-wrap { position: relative; margin-bottom: 18px; }
    .cat-wrap::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 52px;
      background: linear-gradient(to right, transparent, rgba(250,241,228,.96));
      pointer-events: none;
      transition: opacity .25s;
    }
    .cat-wrap.at-end::after { opacity: 0; }
    .cat-tabs {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0;
      padding: 8px 16px; border-radius: 999px;
      font-family: var(--font-b); font-size: .82rem; font-weight: 700;
      border: 1.5px solid var(--border); background: var(--glass); color: var(--text);
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .cat-tab.active, .cat-tab:hover { background: var(--olive); color: white; border-color: var(--olive); }

    /* ── SECTION TITLE ── */
    .section-label {
      font-family: var(--font-t); font-size: 1.5rem; color: var(--olive);
      margin: 20px 0 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(82,126,105,.3), transparent);
    }

    /* ── GRID UNIFORME ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    @media (min-width:500px)  { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width:780px)  { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width:1060px) { .gallery-grid { grid-template-columns: repeat(5, 1fr); } }

    /* ── TILE ── */
    .tile {
      aspect-ratio: 1;
      border-radius: 10px; overflow: hidden;
      position: relative; cursor: pointer;
      background: var(--beige);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: transform .2s, box-shadow .2s;
    }
    .tile:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,.14); }
    .tile img   { display: block; width: 100%; height: 100%; object-fit: cover; }
    .tile .video-bg {
      width: 100%; height: 100%;
      background: #1a2a22;
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
    }
    .tile .play-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(255,255,255,.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: var(--olive);
    }
    .tile .video-label { font-size: .72rem; font-weight: 700; color: rgba(255,255,255,.7); letter-spacing: .05em; }
    .tile .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 45%);
      opacity: 0; transition: opacity .2s;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 10px;
    }
    .tile:hover .overlay { opacity: 1; }
    .tile .tile-sender { font-size: .72rem; color: white; font-weight: 600; }
    .tile .tile-date   { font-size: .65rem; color: rgba(255,255,255,.7); margin-top: 1px; }

    /* ── SELECT MODE ── */
    .select-mode .tile { cursor: default; }
    .select-mode .tile:hover { transform: none; }
    .tile .chk {
      display: none;
      position: absolute; top: 8px; left: 8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: white; border: 2px solid rgba(255,255,255,.8);
      align-items: center; justify-content: center;
      font-size: .75rem; color: var(--olive);
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .select-mode .tile .chk { display: flex; cursor: pointer; }
    .tile.selected { outline: 3px solid var(--olive); outline-offset: 2px; }
    .tile.selected .chk { background: var(--olive); color: white; border-color: var(--olive); }

    /* ── SELECTION BAR ── */
    .sel-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 10px;
      background: var(--olive); color: white;
      padding: 12px 20px; border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
      z-index: 300; white-space: nowrap; font-family: var(--font-b); font-size: .88rem; font-weight: 700;
    }
    .sel-bar.visible { display: flex; }
    .sel-bar button {
      background: rgba(255,255,255,.2); border: none; color: white;
      padding: 7px 14px; border-radius: 8px;
      font-family: var(--font-b); font-weight: 700; font-size: .82rem;
      cursor: pointer; transition: background .2s;
    }
    .sel-bar button:hover { background: rgba(255,255,255,.35); }
    .sel-bar .sel-cancel { background: transparent; border: 1px solid rgba(255,255,255,.4); }

    /* ── STATE MSG ── */
    .state-msg { text-align: center; padding: 60px 20px; color: var(--text); opacity: .6; font-size: .9rem; grid-column: 1 / -1; width: 100%; }
    .state-msg i { font-size: 2.4rem; display: block; margin-bottom: 12px; color: var(--beige); }

    /* ── LOAD MORE ── */
    .load-more { text-align: center; padding: 20px 0; }
    .btn-more {
      padding: 11px 30px; border-radius: 10px;
      background: var(--glass); color: var(--olive);
      border: 1.5px solid var(--border);
      font-family: var(--font-b); font-weight: 700; font-size: .88rem;
      cursor: pointer; transition: all .2s;
    }
    .btn-more:hover { background: var(--olive); color: white; border-color: var(--olive); }

    /* ── LIGHTBOX ── */
    .lb {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.93);
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .lb.open { display: flex; }
    .lb-close {
      position: absolute; top: 12px; right: 16px;
      font-size: 1.8rem; color: white; background: none; border: none;
      cursor: pointer; opacity: .7; transition: opacity .2s; z-index: 10; padding: 8px;
    }
    .lb-close:hover { opacity: 1; }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.12); border: none; color: white;
      font-size: 1.8rem; padding: 10px 14px; cursor: pointer;
      border-radius: 8px; transition: background .2s;
    }
    .lb-nav:hover  { background: rgba(255,255,255,.25); }
    .lb-nav.lbprev { left: 8px; }
    .lb-nav.lbnext { right: 8px; }
    .lb-img { max-width: min(96vw, 1100px); max-height: 80vh; object-fit: contain; border-radius: 8px; display: block; }
    .lb-info {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      text-align: center; color: rgba(255,255,255,.7); font-size: .82rem;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      pointer-events: none;
    }
    .lb-info span { font-weight: 600; color: white; }
    .lb-dl {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 18px; border-radius: 8px;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: white; font-family: var(--font-b); font-size: .78rem; font-weight: 700;
      text-decoration: none; pointer-events: auto; transition: background .2s;
    }
    .lb-dl:hover { background: rgba(255,255,255,.28); }

    /* ── VIEW TOGGLE ── */
    .view-toggle {
      display: flex; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .view-toggle .action-btn { border: none; border-radius: 0; padding: 9px 13px; }
    .view-toggle .action-btn:first-child { border-right: 1px solid var(--border); }

    /* ── UPDATE PILL ── */
    .update-pill {
      display: none; align-items: center; gap: 8px;
      background: var(--olive); color: white;
      padding: 10px 18px; border-radius: 10px;
      font-family: var(--font-b); font-size: .85rem; font-weight: 700;
      cursor: pointer; margin-bottom: 14px;
      transition: filter .2s; width: 100%; justify-content: center; border: none;
    }
    .update-pill:hover { filter: brightness(1.1); }
    .update-pill.visible { display: flex; }

    /* ── FEED LIST ── */
    .feed-list { display: flex; flex-direction: column; gap: 16px; max-width: 600px; margin: 0 auto; }

    /* ── FEED CARD ── */
    .feed-card {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; box-shadow: var(--shadow);
    }
    .feed-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
    .feed-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 700; color: white;
      flex-shrink: 0; letter-spacing: .02em;
    }
    .feed-name { font-weight: 700; font-size: .9rem; color: var(--text); line-height: 1.2; }
    .feed-time { font-size: .72rem; opacity: .55; margin-top: 2px; }
    .feed-cat {
      margin-left: auto; flex-shrink: 0;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(82,126,105,.1); color: var(--olive);
      font-size: .7rem; font-weight: 700; white-space: nowrap;
    }
    .feed-media { width: 100%; line-height: 0; }
    .feed-media > img { display: block; width: 100%; max-height: 480px; object-fit: cover; cursor: pointer; }
    .feed-video {
      background: #1a2a22; height: 180px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; cursor: pointer; text-decoration: none;
    }
    .feed-video .fv-play {
      width: 54px; height: 54px; border-radius: 50%;
      background: rgba(255,255,255,.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: var(--olive);
    }
    .feed-video .fv-label { font-size: .75rem; color: rgba(255,255,255,.65); font-weight: 600; }
    .feed-body { padding: 12px 16px 16px; }
    .feed-caption { font-size: .88rem; line-height: 1.55; color: var(--text); margin-bottom: 8px; }
    .feed-date { font-size: .72rem; opacity: .45; }

    /* ── REACTION BAR ── */
    .reaction-bar {
      display: flex; gap: 10px; padding: 10px 16px 6px;
    }
    .react-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: 1.5px solid var(--border);
      border-radius: 999px; padding: 5px 13px;
      font-size: .82rem; font-weight: 700; cursor: pointer;
      font-family: var(--font-b); color: var(--text);
      transition: all .18s;
    }
    .react-btn:hover { border-color: var(--olive); color: var(--olive); }
    .react-btn.liked { background: rgba(192,57,43,.08); border-color: #c0392b; color: #c0392b; }
    .react-btn .rcount { min-width: 8px; }

    /* ── COMMENT DRAWER ── */
    .drawer-wrap {
      position: fixed; inset: 0; z-index: 5000;
      display: flex; align-items: flex-end; justify-content: center;
      pointer-events: none;
    }
    .drawer-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.45); opacity: 0;
      transition: opacity .25s; pointer-events: none;
    }
    .drawer-wrap.open .drawer-backdrop { opacity: 1; pointer-events: auto; }
    .drawer-wrap.open .drawer-panel { transform: translateY(0); pointer-events: auto; }
    .drawer-panel {
      position: relative; z-index: 1;
      width: min(600px, 100%); max-height: 75vh;
      background: var(--cream); border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1,.23,1);
      overflow: hidden;
    }
    .drawer-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: rgba(82,126,105,.25); margin: 10px auto 0; flex-shrink: 0;
    }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 10px; border-bottom: 1px solid var(--border);
    }
    .drawer-title { font-family: var(--font-t); font-size: 1.25rem; color: var(--olive); }
    .drawer-close {
      background: none; border: none; font-size: 1.4rem; color: var(--text);
      cursor: pointer; opacity: .4; line-height: 1; padding: 4px 8px;
      transition: opacity .2s;
    }
    .drawer-close:hover { opacity: 1; }
    .drawer-comments { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 16px; }
    .comment-item { display: flex; gap: 10px; align-items: flex-start; }
    .comment-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .74rem; font-weight: 700; color: white; flex-shrink: 0;
    }
    .comment-body { flex: 1; }
    .comment-name { font-weight: 700; font-size: .82rem; color: var(--text); }
    .comment-text { font-size: .85rem; line-height: 1.45; margin-top: 2px; word-break: break-word; }
    .comment-time { font-size: .68rem; opacity: .4; margin-top: 3px; }
    .drawer-input-row {
      display: flex; gap: 8px; padding: 10px 14px 14px;
      border-top: 1px solid var(--border); background: white;
    }
    .drawer-input-row input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 999px;
      padding: 9px 16px; font-family: var(--font-b); font-size: .88rem;
      outline: none; background: rgba(250,241,228,.5); transition: border-color .2s;
    }
    .drawer-input-row input:focus { border-color: var(--olive); }
    .drawer-send {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--olive); color: white; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: .9rem;
      transition: filter .2s;
    }
    .drawer-send:hover { filter: brightness(1.1); }
    .drawer-empty { text-align: center; padding: 32px 0; opacity: .4; font-size: .88rem; }

    /* ── NAME PROMPT ── */
    .name-prompt {
      position: fixed; inset: 0; z-index: 6000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.45);
      opacity: 0; transition: opacity .2s; pointer-events: none;
    }
    .name-prompt.open { opacity: 1; pointer-events: auto; }
    .name-card {
      background: var(--cream); border-radius: 20px;
      padding: 28px 24px 24px; max-width: 320px; width: 88%;
      box-shadow: 0 24px 60px rgba(0,0,0,.22);
      display: flex; flex-direction: column; gap: 14px; text-align: center;
    }
    .name-card h3 { font-family: var(--font-t); font-size: 1.7rem; color: var(--olive); }
    .name-card p  { font-size: .82rem; opacity: .6; line-height: 1.5; }
    .name-card input {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      border: 1.5px solid var(--border); background: white;
      font-family: var(--font-b); font-size: .95rem; outline: none;
      text-align: center; transition: border-color .2s;
    }
    .name-card input:focus { border-color: var(--olive); }
    .btn-name-ok {
      padding: 12px; border-radius: 10px;
      background: var(--olive); color: white; border: none;
      font-family: var(--font-b); font-weight: 700; font-size: .95rem;
      cursor: pointer; transition: filter .2s;
    }
    .btn-name-ok:hover { filter: brightness(1.08); }
  </style>
</head>
<body>

  <header class="hdr">
    <img src="img/Logo definitivo.png" alt="A&A">
    <span class="hdr-title">Anyela &amp; Ángel</span>
  </header>

  <main class="main">
    <div class="hero">
      <h1>Galería de la boda</h1>
      <p>Todos los momentos que compartieron los invitados</p>
    </div>

    <div class="stats" id="statsBar"></div>

    <div class="top-bar">
      <a href="fotos.html" class="upload-btn">
        <i class="fa-solid fa-camera"></i> Subir mis fotos
      </a>
      <div class="top-actions">
        <div class="view-toggle">
          <button class="action-btn active" id="btnViewGrid" title="Cuadrícula">
            <i class="fa-solid fa-grip"></i>
          </button>
          <button class="action-btn" id="btnViewFeed" title="Feed">
            <i class="fa-solid fa-bars-staggered"></i>
          </button>
        </div>
        <button class="action-btn" id="btnSelectMode" title="Seleccionar">
          <i class="fa-regular fa-square-check"></i>
        </button>
        <button class="action-btn" id="btnDownload" style="display:none" disabled>
          <i class="fa-solid fa-download"></i> <span id="dlCount">Descargar</span>
        </button>
      </div>
    </div>

    <div class="cat-wrap" id="catWrap">
      <div class="cat-tabs" id="catTabs"></div>
    </div>

    <button class="update-pill" id="updatePill">
      <i class="fa-solid fa-arrow-up"></i>
      <span id="updateCount">0</span> nuevas fotos — actualizar
    </button>

    <div id="galleryArea" class="gallery-grid"></div>

    <div class="load-more" id="loadMoreWrap" style="display:none">
      <button class="btn-more" id="btnMore">Ver más</button>
    </div>
  </main>

  <!-- Selection bar -->
  <div class="sel-bar" id="selBar">
    <span id="selCount">0 seleccionadas</span>
    <button id="btnDlSel"><i class="fa-solid fa-download"></i> Descargar</button>
    <button class="sel-cancel" id="btnCancelSel">Cancelar</button>
  </div>

  <!-- Lightbox -->
  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose"><i class="fa-solid fa-xmark"></i></button>
    <button class="lb-nav lbprev" id="lbPrev"><i class="fa-solid fa-chevron-left"></i></button>
    <img class="lb-img" id="lbImg" src="" alt="">
    <button class="lb-nav lbnext" id="lbNext"><i class="fa-solid fa-chevron-right"></i></button>
    <div class="lb-info" id="lbInfo"></div>
  </div>

  <!-- Name prompt -->
  <div class="name-prompt" id="namePrompt">
    <div class="name-card">
      <h3>Hola 👋</h3>
      <p>¿Cómo te llamás? Así aparecés en los comentarios y likes.</p>
      <input type="text" id="namePromptInput" placeholder="Tu nombre" maxlength="30" autocomplete="off">
      <button class="btn-name-ok" id="namePromptOk">Listo</button>
    </div>
  </div>

  <!-- Comment drawer -->
  <div class="drawer-wrap" id="drawerWrap">
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <span class="drawer-title" id="drawerTitle">Comentarios</span>
        <button class="drawer-close" id="drawerClose">×</button>
      </div>
      <div class="drawer-comments" id="drawerComments"></div>
      <div class="drawer-input-row">
        <input type="text" id="commentInput" placeholder="Escribí un comentario…" maxlength="300" autocomplete="off">
        <button class="drawer-send" id="commentSend"><i class="fa-solid fa-arrow-up"></i></button>
      </div>
    </div>
  </div>

  <script>
    // ─── CONFIG ─────────────────────────────────────────────────────────────
    const ENDPOINT  = 'https://script.google.com/macros/s/AKfycbxwXGm1twFAyPz8C_FM3BH2sN40t85Ib7SnczDOo4hd3fTJveiifHOMrCmJPHXtFhh_Ng/exec';
    const PAGE_SIZE = 24;

    const CATEGORIES = [
      { key: 'all',          label: 'Todos',         icon: '📸' },
      { key: 'Viaje',        label: 'En camino',     icon: '✈️' },
      { key: 'Llegamos',     label: 'Llegamos',      icon: '🛬' },
      { key: 'Hotel',        label: 'Hotel',         icon: '🏨' },
      { key: 'Explorando',   label: 'Explorando BA', icon: '🏙️' },
      { key: 'Preparativos', label: 'Preparativos',  icon: '💄' },
      { key: 'Pre-boda',     label: 'Pre-boda',      icon: '💍' },
      { key: 'Civil',        label: 'Civil',         icon: '🥂' },
      { key: 'Ceremonia',    label: 'Ceremonia',     icon: '🌿' },
      { key: 'Celebracion',  label: 'Celebración',   icon: '🎉' },
      { key: 'General',      label: 'General',       icon: '📷' },
    ];

    // ─── STATE ──────────────────────────────────────────────────────────────
    let allItems    = [];
    let filtered    = [];
    let shown       = 0;
    let activeKey   = 'all';
    let lbIndex     = 0;
    let selectMode  = false;
    let selectedIds = new Set();
    let touchStartX = 0;
    let viewMode    = 'grid';
    let pendingData = null;

    // ─── ELEMENTS ───────────────────────────────────────────────────────────
    const galleryArea  = document.getElementById('galleryArea');
    const statsBar     = document.getElementById('statsBar');
    const catTabs      = document.getElementById('catTabs');
    const loadMoreWrap = document.getElementById('loadMoreWrap');
    const btnMore      = document.getElementById('btnMore');
    const selBar       = document.getElementById('selBar');
    const selCount     = document.getElementById('selCount');
    const btnSelectMode = document.getElementById('btnSelectMode');
    const btnDownload  = document.getElementById('btnDownload');
    const dlCount      = document.getElementById('dlCount');
    const lb           = document.getElementById('lb');
    const lbImg        = document.getElementById('lbImg');
    const lbInfo       = document.getElementById('lbInfo');

    // ─── LOAD ────────────────────────────────────────────────────────────────
    showMsg('<i class="fa-solid fa-spinner fa-spin"></i>', 'Cargando fotos…');

    fetch(`${ENDPOINT}?action=gallery`)
      .then(r => r.json())
      .then(data => {
        if (!data.ok) throw new Error(data.error || 'Error');
        allItems = data.files || [];
        buildStats();
        buildTabs();
        applyFilter('all');
        startAutoRefresh();
        fetchReactions();
      })
      .catch(err => {
        console.error(err);
        showMsg('<i class="fa-solid fa-triangle-exclamation"></i>', 'No se pudieron cargar las fotos.');
      });

    // ─── STATS ───────────────────────────────────────────────────────────────
    function buildStats() {
      const photos   = allItems.filter(f => !f.isVideo).length;
      const videos   = allItems.filter(f => f.isVideo).length;
      const senders  = new Set(allItems.map(f => f.sender).filter(Boolean)).size;
      statsBar.innerHTML = `
        <span class="stat-chip"><i class="fa-solid fa-image"></i> ${photos} fotos</span>
        <span class="stat-chip"><i class="fa-solid fa-video"></i> ${videos} videos</span>
        <span class="stat-chip"><i class="fa-solid fa-users"></i> ${senders} invitados</span>
      `;
    }

    // ─── TABS ────────────────────────────────────────────────────────────────
    const catWrap = document.getElementById('catWrap');

    function checkTabsScroll() {
      const atEnd = catTabs.scrollLeft + catTabs.clientWidth >= catTabs.scrollWidth - 2;
      catWrap.classList.toggle('at-end', atEnd);
    }
    catTabs.addEventListener('scroll', checkTabsScroll, { passive: true });

    function buildTabs() {
      const usedKeys = new Set(allItems.map(f => f.category));
      catTabs.innerHTML = '';
      CATEGORIES.forEach(c => {
        if (c.key !== 'all' && !usedKeys.has(c.key)) return;
        const btn = document.createElement('button');
        btn.className = 'cat-tab' + (c.key === 'all' ? ' active' : '');
        btn.dataset.key = c.key;
        const cnt = c.key === 'all' ? allItems.length : allItems.filter(f => f.category === c.key).length;
        btn.innerHTML = `${c.icon} ${c.label} <small style="opacity:.6">(${cnt})</small>`;
        btn.addEventListener('click', () => {
          catTabs.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyFilter(c.key);
        });
        catTabs.appendChild(btn);
      });
      setTimeout(checkTabsScroll, 50);
    }

    // ─── FILTER ──────────────────────────────────────────────────────────────
    function applyFilter(key) {
      activeKey  = key;
      filtered   = key === 'all' ? [...allItems] : allItems.filter(f => f.category === key);
      shown      = 0;
      galleryArea.innerHTML = '';
      galleryArea.className = viewMode === 'feed' ? 'feed-list' : 'gallery-grid';
      if (!filtered.length) { showMsg('<i class="fa-solid fa-face-sad-cry"></i>', 'No hay fotos en esta categoría.'); return; }
      renderBatch();
    }

    // ─── RENDER BATCH ────────────────────────────────────────────────────────
    function renderBatch() {
      const batch = filtered.slice(shown, shown + PAGE_SIZE);
      batch.forEach((item, i) => {
        const el = viewMode === 'feed' ? buildFeedCard(item, shown + i) : buildTile(item, shown + i);
        galleryArea.appendChild(el);
      });
      shown += batch.length;
      loadMoreWrap.style.display = shown < filtered.length ? 'block' : 'none';
    }
    btnMore.addEventListener('click', renderBatch);

    // ─── TILE ────────────────────────────────────────────────────────────────
    function buildTile(item, index) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.id    = item.fileId;
      tile.dataset.index = index;

      // Checkbox
      const chk = document.createElement('div');
      chk.className = 'chk';
      chk.innerHTML = '<i class="fa-solid fa-check"></i>';
      tile.appendChild(chk);

      if (item.isVideo) {
        tile.innerHTML += `
          <div class="video-bg">
            <div class="play-btn"><i class="fa-solid fa-play"></i></div>
            <span class="video-label">${escHtml(item.sender || '')}</span>
          </div>
          <div class="overlay"><div class="tile-sender">${escHtml(item.sender || '')}</div></div>
        `;
        tile.addEventListener('click', e => {
          if (selectMode) { toggleSelect(tile, item.fileId); return; }
          window.open(item.previewUrl, '_blank', 'noopener');
        });
      } else {
        const img = document.createElement('img');
        img.alt     = item.sender || '';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.onerror = () => {
          img.style.display = 'none';
          const fb = document.createElement('a');
          fb.href   = item.previewUrl;
          fb.target = '_blank'; fb.rel = 'noopener';
          fb.style.cssText = 'aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--beige);color:var(--olive);text-decoration:none;padding:12px;';
          fb.innerHTML = '<i class="fa-solid fa-image" style="font-size:1.8rem"></i><span style="font-size:.72rem;font-weight:700">' + escHtml(item.sender || 'Ver') + '</span>';
          tile.insertBefore(fb, tile.querySelector('.overlay') || tile.lastChild);
        };
        img.src = item.thumbUrl;
        tile.appendChild(img);
        tile.insertAdjacentHTML('beforeend', `<div class="overlay"><div class="tile-sender">${escHtml(item.sender || '')}</div><div class="tile-date">${fmtDate(item.created)}</div></div>`);

        tile.addEventListener('click', e => {
          if (selectMode) { toggleSelect(tile, item.fileId); return; }
          openLb(index);
        });
      }

      return tile;
    }

    // ─── FEED HELPERS ────────────────────────────────────────────────────────
    function avatarBg(name) {
      const palette = ['#527e69','#7a8e6a','#9e7b5a','#6a7a9e','#8e6a7a'];
      let h = 0;
      for (let i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
      return palette[Math.abs(h) % palette.length];
    }
    function getInitials(name) {
      return (name || '?').split(/\s+/).slice(0, 2).map(w => (w[0] || '').toUpperCase()).join('') || '?';
    }
    function timeAgo(ts) {
      if (!ts) return '';
      const diff = Date.now() - ts;
      const min  = Math.floor(diff / 60000);
      if (min < 1)   return 'ahora mismo';
      if (min < 60)  return `hace ${min} min`;
      const hr = Math.floor(min / 60);
      if (hr < 24)   return `hace ${hr} h`;
      const d = Math.floor(hr / 24);
      if (d < 7)     return `hace ${d} día${d > 1 ? 's' : ''}`;
      return new Date(ts).toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    }

    // ─── BUILD FEED CARD ─────────────────────────────────────────────────────
    function buildFeedCard(item, index) {
      const card = document.createElement('div');
      card.className = 'feed-card';

      const catInfo = CATEGORIES.find(c => c.key === item.category) || { label: item.category || 'General', icon: '📷' };
      const bg  = avatarBg(item.sender || '');
      const ini = getInitials(item.sender || 'Inv');

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'feed-header';
      const av = document.createElement('div');
      av.className = 'feed-avatar';
      av.style.background = bg;
      av.textContent = ini;
      const meta = document.createElement('div');
      const nameEl = document.createElement('div');
      nameEl.className = 'feed-name';
      nameEl.textContent = item.sender || 'Invitado';
      const timeEl = document.createElement('div');
      timeEl.className = 'feed-time';
      timeEl.textContent = timeAgo(item.created);
      meta.appendChild(nameEl);
      meta.appendChild(timeEl);
      const catEl = document.createElement('span');
      catEl.className = 'feed-cat';
      catEl.textContent = catInfo.icon + ' ' + catInfo.label;
      hdr.appendChild(av);
      hdr.appendChild(meta);
      hdr.appendChild(catEl);
      card.appendChild(hdr);

      // Media
      const media = document.createElement('div');
      media.className = 'feed-media';
      if (item.isVideo) {
        const vLink = document.createElement('a');
        vLink.href = item.previewUrl; vLink.target = '_blank'; vLink.rel = 'noopener';
        vLink.className = 'feed-video';
        vLink.innerHTML = '<div class="fv-play"><i class="fa-solid fa-play"></i></div><span class="fv-label">▶ Ver video</span>';
        media.appendChild(vLink);
      } else {
        const img = document.createElement('img');
        img.src = item.thumbUrl; img.alt = item.sender || ''; img.loading = 'lazy'; img.decoding = 'async';
        img.addEventListener('click', () => openLb(index));
        img.onerror = () => {
          img.style.display = 'none';
          const fb = document.createElement('a');
          fb.href = item.previewUrl; fb.target = '_blank'; fb.rel = 'noopener';
          fb.className = 'feed-video';
          fb.innerHTML = '<div class="fv-play"><i class="fa-solid fa-image"></i></div><span class="fv-label">Ver foto</span>';
          media.insertBefore(fb, img);
        };
        media.appendChild(img);
      }
      card.appendChild(media);

      // Reaction bar
      card.appendChild(buildReactionBar(item.fileId));

      // Body: caption + date
      const body = document.createElement('div');
      body.className = 'feed-body';
      if (item.caption) {
        const cap = document.createElement('div');
        cap.className = 'feed-caption';
        cap.textContent = item.caption;
        body.appendChild(cap);
      }
      const dateEl2 = document.createElement('div');
      dateEl2.className = 'feed-date';
      dateEl2.textContent = fmtDate(item.created);
      body.appendChild(dateEl2);
      card.appendChild(body);

      return card;
    }

    // ─── SELECT MODE ─────────────────────────────────────────────────────────
    const viewToggle = document.querySelector('.view-toggle');

    function enterSelectMode() {
      selectMode = true;
      selectedIds.clear();
      galleryArea.classList.add('select-mode');
      btnSelectMode.classList.add('active');
      btnSelectMode.innerHTML = '<i class="fa-solid fa-xmark"></i> Cancelar';
      btnSelectMode.style.display = '';
      btnDownload.style.display = 'inline-flex';
      viewToggle.style.display = 'none';
      updateSelBar();
    }

    function exitSelectMode() {
      selectMode = false;
      selectedIds.clear();
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
      galleryArea.classList.remove('select-mode');
      btnSelectMode.classList.remove('active');
      btnSelectMode.innerHTML = '<i class="fa-regular fa-square-check"></i>';
      btnSelectMode.style.display = viewMode === 'feed' ? 'none' : '';
      btnDownload.style.display = 'none';
      viewToggle.style.display = '';
      updateSelBar();
    }

    btnSelectMode.addEventListener('click', () => {
      if (selectMode) exitSelectMode(); else enterSelectMode();
    });

    document.getElementById('btnCancelSel').addEventListener('click', exitSelectMode);

    function toggleSelect(tile, id) {
      if (selectedIds.has(id)) { selectedIds.delete(id); tile.classList.remove('selected'); }
      else                     { selectedIds.add(id);    tile.classList.add('selected');    }
      updateSelBar();
    }

    function updateSelBar() {
      const n = selectedIds.size;
      selCount.textContent = n + ' seleccionada' + (n !== 1 ? 's' : '');
      dlCount.textContent  = n ? `Descargar (${n})` : 'Descargar';
      btnDownload.disabled = n === 0;
      selBar.classList.toggle('visible', selectMode && n > 0);
    }

    // ─── DOWNLOAD SELECTED ───────────────────────────────────────────────────
    async function downloadSelected() {
      const ids  = [...selectedIds];
      const imgs = filtered.filter(f => ids.includes(f.fileId) && !f.isVideo);
      const vids = filtered.filter(f => ids.includes(f.fileId) && f.isVideo);

      if (!imgs.length && !vids.length) return;

      // Videos: abrir en Drive
      vids.forEach(v => window.open(v.previewUrl, '_blank', 'noopener'));

      if (!imgs.length) return;

      const btnEl = document.getElementById('btnDlSel');
      btnEl.disabled = true;

      if (imgs.length === 1) {
        // Descarga individual directa
        const a = document.createElement('a');
        a.href = imgs[0].downloadUrl; a.download = ''; a.target = '_blank';
        a.click();
        btnEl.disabled = false;
        return;
      }

      // Múltiples → zip
      btnEl.textContent = 'Preparando zip…';
      const zip = new JSZip();
      let ok = 0;

      for (let i = 0; i < imgs.length; i++) {
        btnEl.textContent = `Descargando ${i+1}/${imgs.length}…`;
        try {
          const r = await fetch(imgs[i].previewUrl);
          if (!r.ok) throw new Error('fetch failed');
          const blob = await r.blob();
          const ext  = (imgs[i].mimeType || 'image/jpeg').split('/')[1] || 'jpg';
          zip.file(`${String(i+1).padStart(3,'0')}_${imgs[i].sender || 'foto'}.${ext}`, blob);
          ok++;
        } catch(e) {
          // Si CORS falla, intentar descarga directa
          window.open(imgs[i].downloadUrl, '_blank', 'noopener');
        }
      }

      if (ok > 0) {
        const content = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
        const url = URL.createObjectURL(content);
        const a   = document.createElement('a');
        a.href = url; a.download = 'fotos-boda-anyela-angel.zip';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      btnEl.textContent = 'Descargar';
      btnEl.disabled    = false;
    }

    document.getElementById('btnDlSel').addEventListener('click', downloadSelected);
    document.getElementById('btnDownload').addEventListener('click', downloadSelected);

    // ─── LIGHTBOX ────────────────────────────────────────────────────────────
    function openLb(index) {
      lbIndex = index;
      renderLb();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLb() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
      lbImg.src = '';
    }

    function renderLb() {
      const item = filtered[lbIndex];
      if (!item) return;
      lbImg.src = item.previewUrl;
      lbImg.alt = item.sender || '';
      const captionHtml = item.caption
        ? `<span style="font-size:.8rem;opacity:.75;max-width:340px;line-height:1.4;font-style:italic">"${escHtml(item.caption)}"</span>`
        : '';
      lbInfo.innerHTML = `
        <span>${escHtml(item.sender || 'Invitado')}</span> · ${lbIndex + 1} / ${filtered.length}
        ${captionHtml}
        <a class="lb-dl" href="${item.downloadUrl}" download target="_blank" rel="noopener">
          <i class="fa-solid fa-download"></i> Descargar
        </a>
      `;
      document.getElementById('lbPrev').style.visibility = lbIndex > 0                   ? 'visible' : 'hidden';
      document.getElementById('lbNext').style.visibility = lbIndex < filtered.length - 1 ? 'visible' : 'hidden';
    }

    document.getElementById('lbClose').addEventListener('click', closeLb);
    document.getElementById('lbPrev').addEventListener('click', () => { if (lbIndex > 0)                   { lbIndex--; renderLb(); } });
    document.getElementById('lbNext').addEventListener('click', () => { if (lbIndex < filtered.length - 1) { lbIndex++; renderLb(); } });

    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

    // Swipe en móvil
    lbImg.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lbImg.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        if (dx < 0 && lbIndex < filtered.length - 1) { lbIndex++; renderLb(); }
        if (dx > 0 && lbIndex > 0)                   { lbIndex--; renderLb(); }
      }
    }, { passive: true });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLb();
      if (e.key === 'ArrowLeft'  && lbIndex > 0)                   { lbIndex--; renderLb(); }
      if (e.key === 'ArrowRight' && lbIndex < filtered.length - 1) { lbIndex++; renderLb(); }
    });

    // ─── VIEW TOGGLE ─────────────────────────────────────────────────────────
    document.getElementById('btnViewGrid').addEventListener('click', () => {
      if (viewMode === 'grid') return;
      if (selectMode) exitSelectMode();
      viewMode = 'grid';
      document.getElementById('btnViewGrid').classList.add('active');
      document.getElementById('btnViewFeed').classList.remove('active');
      btnSelectMode.style.display = '';
      shown = 0; galleryArea.innerHTML = '';
      galleryArea.className = 'gallery-grid';
      if (filtered.length) renderBatch();
    });
    document.getElementById('btnViewFeed').addEventListener('click', () => {
      if (viewMode === 'feed') return;
      if (selectMode) exitSelectMode();
      viewMode = 'feed';
      document.getElementById('btnViewFeed').classList.add('active');
      document.getElementById('btnViewGrid').classList.remove('active');
      btnSelectMode.style.display = 'none';
      shown = 0; galleryArea.innerHTML = '';
      galleryArea.className = 'feed-list';
      if (filtered.length) renderBatch();
    });

    // ─── AUTO-REFRESH ─────────────────────────────────────────────────────────
    const updatePill = document.getElementById('updatePill');
    updatePill.addEventListener('click', () => {
      if (!pendingData) return;
      allItems = pendingData;
      pendingData = null;
      updatePill.classList.remove('visible');
      buildStats(); buildTabs(); applyFilter(activeKey);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    function startAutoRefresh() {
      setInterval(() => {
        fetch(`${ENDPOINT}?action=gallery&_t=${Date.now()}`)
          .then(r => r.json())
          .then(data => {
            if (!data.ok) return;
            const fresh = data.files || [];
            if (fresh.length > allItems.length) {
              const diff = fresh.length - allItems.length;
              pendingData = fresh;
              document.getElementById('updateCount').textContent = diff;
              updatePill.classList.add('visible');
            }
          })
          .catch(() => {});
      }, 60000);
    }

    // ─── REACTIONS STATE ─────────────────────────────────────────────────────
    let myName    = localStorage.getItem('weddingName') || '';
    let reactions = {};
    let drawerFid = null;

    // ─── NAME PROMPT ─────────────────────────────────────────────────────────
    const namePromptEl  = document.getElementById('namePrompt');
    const nameInputEl   = document.getElementById('namePromptInput');
    let   nameResolve   = null;

    function askName() {
      return new Promise(resolve => {
        nameResolve = resolve;
        namePromptEl.classList.add('open');
        nameInputEl.value = '';
        setTimeout(() => nameInputEl.focus(), 280);
      });
    }
    function confirmName() {
      const val = nameInputEl.value.trim();
      if (!val) return;
      myName = val;
      localStorage.setItem('weddingName', myName);
      namePromptEl.classList.remove('open');
      if (nameResolve) { nameResolve(myName); nameResolve = null; }
    }
    async function ensureName() {
      if (myName) return myName;
      return askName();
    }
    document.getElementById('namePromptOk').addEventListener('click', confirmName);
    nameInputEl.addEventListener('keydown', e => { if (e.key === 'Enter') confirmName(); });
    namePromptEl.addEventListener('click', e => {
      if (e.target === namePromptEl) {
        namePromptEl.classList.remove('open');
        if (nameResolve) { nameResolve(null); nameResolve = null; }
      }
    });

    // ─── FETCH & UPDATE REACTIONS ─────────────────────────────────────────────
    async function fetchReactions() {
      try {
        const r = await fetch(`${ENDPOINT}?action=reactions&name=${encodeURIComponent(myName)}&_t=${Date.now()}`);
        const d = await r.json();
        if (d.ok) { reactions = d.reactions || {}; updateAllReactionUIs(); }
      } catch(e) {}
    }

    function getRx(fid) {
      return reactions[fid] || { likes: 0, likedByMe: false, comments: 0 };
    }

    function updateAllReactionUIs() {
      document.querySelectorAll('[data-rxfid]').forEach(bar => {
        const fid = bar.dataset.rxfid;
        const rx  = getRx(fid);
        const lb  = bar.querySelector('.like-btn');
        const cb  = bar.querySelector('.comment-btn');
        if (lb) { lb.classList.toggle('liked', !!rx.likedByMe); lb.querySelector('.rcount').textContent = rx.likes || ''; }
        if (cb) { cb.querySelector('.rcount').textContent = rx.comments || ''; }
      });
    }

    // ─── LIKE TOGGLE ─────────────────────────────────────────────────────────
    async function toggleLike(fid) {
      const name = await ensureName();
      if (!name) return;
      if (!reactions[fid]) reactions[fid] = { likes: 0, likedByMe: false, comments: 0 };
      const was = reactions[fid].likedByMe;
      reactions[fid].likedByMe = !was;
      reactions[fid].likes = Math.max(0, reactions[fid].likes + (was ? -1 : 1));
      updateAllReactionUIs();
      const body = JSON.stringify({ action: 'like', fileId: fid, name });
      try {
        await fetch(ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body });
      } catch(corsErr) {
        // CORS bloquea la respuesta pero el request SÍ llegó al servidor — no revertir
        try { await fetch(ENDPOINT, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body }); } catch(e) {}
      }
    }

    // ─── REACTION BAR BUILDER ─────────────────────────────────────────────────
    function buildReactionBar(fid) {
      const bar = document.createElement('div');
      bar.className = 'reaction-bar';
      bar.dataset.rxfid = fid;
      const rx = getRx(fid);

      const lb = document.createElement('button');
      lb.className = 'react-btn like-btn' + (rx.likedByMe ? ' liked' : '');
      lb.innerHTML = `❤️ <span class="rcount">${rx.likes || ''}</span>`;
      lb.addEventListener('click', e => { e.stopPropagation(); toggleLike(fid); });

      const cb = document.createElement('button');
      cb.className = 'react-btn comment-btn';
      cb.innerHTML = `💬 <span class="rcount">${rx.comments || ''}</span>`;
      cb.addEventListener('click', e => { e.stopPropagation(); openDrawer(fid); });

      bar.appendChild(lb); bar.appendChild(cb);
      return bar;
    }

    // ─── COMMENT DRAWER ──────────────────────────────────────────────────────
    const drawerWrapEl   = document.getElementById('drawerWrap');
    const drawerComments = document.getElementById('drawerComments');
    const commentInputEl = document.getElementById('commentInput');

    async function openDrawer(fid) {
      drawerFid = fid;
      drawerComments.innerHTML = '<div class="drawer-empty">Cargando…</div>';
      document.getElementById('drawerTitle').textContent = 'Comentarios';
      drawerWrapEl.classList.add('open');
      document.body.style.overflow = 'hidden';
      try {
        const r = await fetch(`${ENDPOINT}?action=comments&fileId=${encodeURIComponent(fid)}&_t=${Date.now()}`);
        const d = await r.json();
        renderComments(d.comments || []);
      } catch(e) {
        drawerComments.innerHTML = '<div class="drawer-empty">No se pudieron cargar.</div>';
      }
    }

    function renderComments(list) {
      if (!list.length) {
        drawerComments.innerHTML = '<div class="drawer-empty">Aún no hay comentarios.<br>¡Sé el primero! 💬</div>';
        return;
      }
      drawerComments.innerHTML = '';
      list.forEach(c => appendComment(c.sender, c.comment, c.created));
      drawerComments.scrollTop = drawerComments.scrollHeight;
    }

    function appendComment(sender, text, ts) {
      const item = document.createElement('div');
      item.className = 'comment-item';
      const bg  = avatarBg(sender);
      const ini = getInitials(sender);
      item.innerHTML = `
        <div class="comment-avatar" style="background:${bg}">${escHtml(ini)}</div>
        <div class="comment-body">
          <div class="comment-name">${escHtml(sender)}</div>
          <div class="comment-text">${escHtml(text)}</div>
          <div class="comment-time">${timeAgo(ts) || 'ahora mismo'}</div>
        </div>`;
      drawerComments.appendChild(item);
    }

    function closeDrawer() {
      drawerWrapEl.classList.remove('open');
      document.body.style.overflow = '';
      drawerFid = null;
      commentInputEl.value = '';
    }

    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    document.getElementById('drawerBackdrop').addEventListener('click', closeDrawer);

    async function sendComment() {
      const text = commentInputEl.value.trim();
      if (!text || !drawerFid) return;
      const name = await ensureName();
      if (!name) return;

      const btn = document.getElementById('commentSend');
      btn.disabled = true;
      commentInputEl.value = '';

      const body = JSON.stringify({ action: 'comment', fileId: drawerFid, name, comment: text });
      let sent = false;
      try {
        const r = await fetch(ENDPOINT, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body });
        const d = await r.json();
        sent = d.ok;
      } catch(corsErr) {
        // CORS bloquea la respuesta pero el request SÍ llegó — asumir éxito
        try { await fetch(ENDPOINT, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body }); } catch(e) {}
        sent = true;
      }

      if (sent) {
        if (!reactions[drawerFid]) reactions[drawerFid] = { likes: 0, likedByMe: false, comments: 0 };
        reactions[drawerFid].comments++;
        updateAllReactionUIs();
        const empty = drawerComments.querySelector('.drawer-empty');
        if (empty) empty.remove();
        appendComment(name, text, Date.now());
        drawerComments.scrollTop = drawerComments.scrollHeight;
      } else {
        commentInputEl.value = text;
      }
      btn.disabled = false;
    }

    document.getElementById('commentSend').addEventListener('click', sendComment);
    commentInputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendComment(); });

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    function showMsg(icon, text) {
      galleryArea.innerHTML = `<div class="state-msg">${icon}<br>${text}</div>`;
    }
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmtDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    }
  </script>
